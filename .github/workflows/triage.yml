# What it does: Classifies new issues by content, applies a label, and posts a matching response template.
# When it runs: Immediately when an issue is opened by a non-bot actor.
# Permissions: issues:write (labels + comments), contents:read (checkout).

name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: Classify and respond
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    timeout-minutes: 5
    concurrency:
      group: triage-${{ github.event.issue.number }}
      cancel-in-progress: false
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version: '20'

      - name: Classify issue
        id: classify
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: node src/classify.js

      - name: Apply label
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          LABEL: ${{ steps.classify.outputs.label }}
        with:
          script: |
            const label = process.env.LABEL
            const { data: existing } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            if (!existing.map(l => l.name).includes(label)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [label],
              })
              core.notice(`Applied label: ${label}`)
            } else {
              core.notice(`Label already present, skipping: ${label}`)
            }

      - name: Check for existing bot comment
        id: check-comment
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const alreadyCommented = comments.some(c =>
              c.user.type === 'Bot' && c.body.includes('automated response')
            )
            core.setOutput('already_commented', String(alreadyCommented))

      - name: Post response
        if: steps.check-comment.outputs.already_commented != 'true'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b  # v7
        env:
          LABEL: ${{ steps.classify.outputs.label }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const { readFileSync } = require('fs')
            const { join } = require('path')
            const label = process.env.LABEL
            const runUrl = process.env.RUN_URL
            const templatePath = join(process.env.GITHUB_WORKSPACE, `.github/responses/${label}.md`)
            let body = readFileSync(templatePath, 'utf8')
            body += `\n\n---\n_This is an automated response. [View workflow run →](${runUrl})_`
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            })
